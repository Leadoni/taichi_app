name: Deploy to GitHub Pages (with retry)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait, then retry
        if: steps.d1.outcome == 'failure'
        run: echo "Attempt 1 failed (transient) — retry in 20s"; sleep 20
      - name: Deploy (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait, then final retry
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: echo "Attempt 2 failed — final retry in 30s"; sleep 30
      - name: Deploy (attempt 3)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
